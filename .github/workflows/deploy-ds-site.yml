name: Deploy DS Site

on:
  push:
    branches: [main]
    paths: ['src/publish/ds-site-v2/**', 'ledger/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: src/publish/ds-site-v2/pnpm-lock.yaml

      - name: Install
        working-directory: src/publish/ds-site-v2
        run: pnpm install --frozen-lockfile

      - name: Build tokens
        working-directory: src/publish/ds-site-v2
        run: pnpm build:tokens

      - name: Build site
        working-directory: src/publish/ds-site-v2
        run: pnpm build
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/publish/ds-site-v2/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
